<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meta Ads Figueira</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <section id="loginView" class="login-view">
      <form id="loginForm" class="panel login-panel">
        <p class="eyebrow">Acesso restrito</p>
        <h1>Meta Ads Figueira</h1>
        <label>
          E-mail
          <input id="email" type="email" autocomplete="username" value="sguilherme@sz4marketing.com" />
        </label>
        <label>
          Senha
          <input id="password" type="password" autocomplete="current-password" />
        </label>
        <button type="submit">Entrar</button>
        <p id="loginError" class="error-text"></p>
      </form>
    </section>

    <main class="shell">
      <section class="panel header">
        <div>
          <p class="eyebrow">Meta Ads + OpenAI</p>
          <h1>Meta Ads Figueira</h1>
          <p class="muted">
            Operacao assistida para campanhas, conjuntos, targeting e auditoria.
          </p>
        </div>
        <div class="header-actions">
          <button id="healthButton" class="icon-button" title="Verificar API">OK</button>
          <button id="logoutButton">Sair</button>
        </div>
      </section>

      <section class="grid">
        <div class="panel">
          <div class="section-title">
            <h2>Chat operacional</h2>
            <span id="sessionBadge"></span>
          </div>
          <div id="chatLog" class="chat-log"></div>
          <form id="chatForm" class="chat-form">
            <textarea
              id="message"
              rows="4"
              placeholder="Ex.: Diagnostique o conjunto ADSET_ID e diga se pode entregar fora de Sao Paulo."
            ></textarea>
            <button type="submit">Enviar</button>
          </form>
        </div>

        <div class="panel">
          <h2>Testes rapidos</h2>
          <div class="stack">
            <button id="configButton">Validar .env</button>
            <button id="businessesButton">Negócios</button>
            <button id="accountsButton">Contas</button>
            <button id="accountButton">Conta ativa</button>
            <button id="campaignsButton">Campanhas</button>
            <button id="adSetsButton">Conjuntos</button>
          </div>
          <label>
            Conta de anúncios
            <select id="adAccountSelect">
              <option value="">Selecione uma conta</option>
            </select>
          </label>
          <p class="muted small-note">
            Para diagnosticar targeting, clique em <strong>Conjuntos</strong> e copie o <strong>id</strong> de um conjunto de anúncios. Não use ID de campanha.
          </p>
          <label>
            ID do conjunto de anúncios
            <input id="adSetId" placeholder="Ex.: 120245475202310185" />
          </label>
          <div class="stack">
            <button id="adSetButton">Buscar conjunto</button>
            <button id="targetingButton">Targeting</button>
            <button id="diagnoseButton">Diagnosticar</button>
          </div>
          <pre id="output">{}</pre>
        </div>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
